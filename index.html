<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>internship form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div align="center">
    <h1 class="form-title">Internship Application Form</h1>
    <h3>Start your career journey with us </h3>
    </div><br><br>
       
<div class="container">
<div class="name"><label style="display:inline-block;width: 140px">Name : </label>
<input type ="text" placeholder="Enter your name" required><br><br></div>
<label style="display:inline-block;width: 140px">Age : </label>
<input type="number" placeholder="Enter your age"><br><br>
<lable style="display:inline-block;width: 140px">CGPA :</lable>
<input type="number" step="0.01" placeholder="Enter your CGPA"><br><br>
<lable style="display:inline-block;width: 140px">grade :</lable>
<input type="text" placeholder="Enter your grade"><br><br>
<lable style="display:inline-block;width: 140px">1st Semester Result :</lable>
<input type="text" placeholder="Enter your result"><br><br>
<lable style="display:inline-block;width: 140px">Email :</lable>
<input type="email" placeholder="Enter your email"><br><br>
<lable style="display:inline-block;width: 140px">Phone Number : </lable>
<input type="tel" placeholder="Enter your phone number"><br><br>
<lable style="display:inline-block;width: 140px">Address :</lable>
<input type="text" placeholder="Enter your address"><br><br>
<lable style="display:inline-block;width: 140px">Course :</lable>
<select>
    <option>CSE</option>
    <option>CSD</option>
</select><br><br>


<lable style="display:inline-block;width: 140px">University :</lable>
<input type="text" placeholder="Enter your university"><br><br>
<lable style="display:inline-block;width: 140px"    >Branch :</lable>
<select>
    <option>CSD</option>
    <option>CSE</option>
</select><br><br>
<lable style="display:inline-block;width: 140px"    >year_of_study :</lable>
<select>
    <option>1st year</option>
    <option>2nd year</option>
    <option>3rd year</option>
    <option>4th year</option>
</select><br><br>

<lable style="display:inline-block;width: 140px">project_link:</lable>
<textarea></textarea><br><br>

<lable style="display:inline-block;width: 140px">Skills:</lable>
<input type="checkbox" value="python"> Python
<input type="checkbox" value="java"> Java
<input type="checkbox" value="c++"> C++

<br><br>

<lable style="display:inline-block;width: 140px">Github_profile :</lable>
<input type="text" ><br><br>

<lable style="display:inline-block;width: 140px">LinkedIn_profile :</lable>
<input type="text"><br><br>
 
<div align="center">
<button onclick="alert('Form Submitted Successfully!')"> Submit</button>
</div>

</div>
</body>
</html>
